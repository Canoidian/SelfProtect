name: SelfProtect
options:
  bundleIdPrefix: com.selfprotect
  deploymentTarget:
    macOS: "14.0"

settings:
  SWIFT_VERSION: "5.9"
  SDKROOT: macosx

packages:
  SelfProtectKit:
    path: SelfProtectKit

targets:
  SelfProtect:
    type: application
    platform: macOS
    sources:
      - path: SelfProtect
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.selfprotect.app
        INFOPLIST_FILE: SelfProtect/Info.plist
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
    resources:
      - path: SelfProtect/Library
        destination: "Library"
    dependencies:
      - package: SelfProtectKit
      - target: SelfProtectHelper
    entitlements:
      path: SelfProtect/SelfProtect.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
    postCompileScripts:
      - name: Copy Helper into App Bundle
        script: |
          HELPER_SOURCE="$BUILT_PRODUCTS_DIR/SelfProtectHelper"
          HELPER_DEST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/MacOS/SelfProtectHelper"
          if [ -f "$HELPER_SOURCE" ]; then
            cp "$HELPER_SOURCE" "$HELPER_DEST"
          fi
        inputFiles: []
        outputFiles: []

  SelfProtectHelper:
    type: tool
    platform: macOS
    sources:
      - path: SelfProtectHelper
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: SelfProtectKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.selfprotect.helper
        INFOPLIST_FILE: SelfProtectHelper/Info.plist
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: SelfProtectHelper/SelfProtectHelper.entitlements
      properties:
        com.apple.security.app-sandbox: false
